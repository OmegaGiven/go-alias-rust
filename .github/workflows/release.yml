name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: go-alias-installer-linux-x86_64.tar.gz
            binary: go_service
            install_script: install-linux.sh
          - name: macos-arm64
            os: macos-latest
            archive: go-alias-installer-macos-arm64.tar.gz
            binary: go_service
            install_script: install-macos.sh
          - name: windows-x86_64
            os: windows-latest
            archive: go-alias-installer-windows-x86_64.zip
            binary: go_service.exe
            install_script: install-windows.ps1

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare package
        shell: bash
        run: |
          mkdir -p "dist/go-alias-installer-${{ matrix.name }}"
          cp "target/release/${{ matrix.binary }}" "dist/go-alias-installer-${{ matrix.name }}/"
          cp README.md "dist/go-alias-installer-${{ matrix.name }}/"
          cp -R static "dist/go-alias-installer-${{ matrix.name }}/static"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp scripts/install-local-windows.ps1 "dist/go-alias-installer-${{ matrix.name }}/${{ matrix.install_script }}"
          else
            cp scripts/install-local-unix.sh "dist/go-alias-installer-${{ matrix.name }}/${{ matrix.install_script }}"
            chmod +x "dist/go-alias-installer-${{ matrix.name }}/${{ matrix.install_script }}"
          fi

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          tar -czf "${{ matrix.archive }}" "go-alias-installer-${{ matrix.name }}"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/go-alias-installer-${{ matrix.name }}" -DestinationPath "dist/${{ matrix.archive }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
